<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temple Clicker</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #d4af37; --bg: #f8f9fa; 
            --white: #ffffff; --gold: #f1c40f;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Top Stats Section */
        .header {
            background: var(--white); padding: 20px 15px; text-align: center;
            border-bottom: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .score { font-size: 2rem; font-weight: 800; color: var(--primary); margin: 0; }
        .sps-text { font-size: 0.9rem; color: #666; margin-top: 5px; }

        /* Central Play Area */
        .game-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; padding-bottom: 80px;
        }
        #temple-btn {
            font-size: 140px; cursor: pointer; user-select: none;
            transition: transform 0.05s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }
        #temple-btn:active { transform: scale(0.9); }

        .progress-container { width: 80%; margin-top: 20px; }
        .progress-bar { background: #e0e0e0; height: 12px; border-radius: 6px; overflow: hidden; }
        #progress-fill { background: var(--accent); width: 0%; height: 100%; transition: width 0.3s; }
        .temple-label { font-weight: bold; color: var(--primary); margin-bottom: 8px; display: block; text-align: center; }

        /* iOS-Style Bottom Menu */
        .bottom-sheet {
            position: fixed; bottom: 0; width: 100%; background: var(--white);
            border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            height: 45vh; display: flex; flex-direction: column; z-index: 100;
        }
        .handle { width: 40px; height: 5px; background: #ccc; border-radius: 3px; margin: 10px auto; }
        .upgrade-list { flex: 1; overflow-y: auto; padding: 0 15px 20px; }

        /* Upgrade Cards */
        .upgrade-card {
            display: flex; align-items: center; background: #f1f3f5;
            padding: 12px; margin-bottom: 10px; border-radius: 12px;
            border: 1px solid transparent;
        }
        .upgrade-card:active { background: #e9ecef; }
        .info { flex: 1; }
        .info b { font-size: 1rem; display: block; color: var(--primary); }
        .info span { font-size: 0.8rem; color: #777; }
        
        .buy-btn {
            background: var(--primary); color: white; border: none;
            padding: 10px 16px; border-radius: 20px; font-weight: bold;
            min-width: 80px; font-size: 0.9rem;
        }
        .buy-btn:disabled { background: #ccc; opacity: 0.6; }

        /* Floating Text */
        .float {
            position: absolute; color: var(--accent); font-weight: bold;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        /* Dedicate Button Overlay */
        #dedicate-overlay {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: var(--primary); padding: 15px 30px;
            border-radius: 30px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: none; z-index: 50; border: none; font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="score" id="points">0</div>
    <div class="sps-text">Service Points | <span id="sps">0</span>/sec</div>
</div>

<div class="game-area" id="touch-zone">
    <button id="dedicate-overlay" onclick="dedicate()">✨ DEDICATE TEMPLE</button>
    
    <span class="temple-label" id="temple-name">St. George Utah</span>
    <div id="temple-btn">🏛️</div>

    <div class="progress-container">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div style="text-align: center; font-size: 0.8rem; margin-top: 5px; color: #888;">
            Construction: <span id="percent">0</span>%
        </div>
    </div>
</div>

<div class="bottom-sheet">
    <div class="handle"></div>
    <div style="padding: 0 15px 10px; font-weight: bold; font-size: 1.1rem; border-bottom: 1px solid #eee;">Callings & Upgrades</div>
    <div class="upgrade-list" id="upgrade-list">
        </div>
</div>

<script>
    let state = {
        sp: 0, sps: 0, faith: 1.0, templeIdx: 0,
        inventory: new Array(10).fill(0)
    };

    const temples = [
        { name: "St. George Utah", goal: 500, icon: "🏛️" },
        { name: "Salt Lake City", goal: 5000, icon: "🕍" },
        { name: "Rome Italy", goal: 50000, icon: "🇮🇹" },
        { name: "Tokyo Japan", goal: 250000, icon: "⛩️" }
    ];

    const upgrades = [
        { name: "Primary Volunteer", cost: 15, sps: 0.5 },
        { name: "Youth Service", cost: 100, sps: 3 },
        { name: "Indexing Group", cost: 500, sps: 15 },
        { name: "Ward Organist", cost: 2500, sps: 60 },
        { name: "Temple Architect", cost: 12000, sps: 200 },
        { name: "Brick Mason", cost: 50000, sps: 800 },
        { name: "Tabernacle Choir", cost: 250000, sps: 3500 }
    ];

    function init() {
        const saved = localStorage.getItem('templeMobileSave');
        if (saved) state = JSON.parse(saved);
        render();
        setInterval(loop, 100);
    }

    function render() {
        const list = document.getElementById('upgrade-list');
        list.innerHTML = upgrades.map((u, i) => {
            const count = state.inventory[i] || 0;
            const cost = Math.floor(u.cost * Math.pow(1.2, count));
            return `
                <div class="upgrade-card">
                    <div class="info">
                        <b>${u.name} (${count})</b>
                        <span>+${u.sps} SP/s</span>
                    </div>
                    <button class="buy-btn" id="btn-${i}" onclick="buy(${i})" ${state.sp < cost ? 'disabled' : ''}>
                        ${format(cost)}
                    </button>
                </div>
            `;
        }).join('');
    }

    function buy(i) {
        const cost = Math.floor(upgrades[i].cost * Math.pow(1.2, state.inventory[i]));
        if (state.sp >= cost) {
            state.sp -= cost;
            state.inventory[i]++;
            calculateSps();
            render();
            updateUI();
        }
    }

    function calculateSps() {
        state.sps = upgrades.reduce((acc, u, i) => acc + (u.sps * state.inventory[i]), 0);
    }

    document.getElementById('temple-btn').addEventListener('touchstart', (e) => {
        e.preventDefault(); // Prevents zooming on fast taps
        let clickVal = (1 + (state.sps * 0.1)) * state.faith;
        state.sp += clickVal;
        
        const touch = e.touches[0];
        spawnFloat(touch.pageX, touch.pageY, `+${Math.ceil(clickVal)}`);
        updateUI();
    });

    function updateUI() {
        document.getElementById('points').innerText = Math.floor(state.sp).toLocaleString();
        document.getElementById('sps').innerText = format(state.sps * state.faith);
        
        const t = temples[state.templeIdx];
        document.getElementById('temple-name').innerText = t.name;
        document.getElementById('temple-btn').innerText = t.icon;
        
        let prog = (state.sp / t.goal) * 100;
        document.getElementById('progress-fill').style.width = Math.min(prog, 100) + "%";
        document.getElementById('percent').innerText = Math.min(Math.floor(prog), 100);
        document.getElementById('dedicate-overlay').style.display = prog >= 100 ? 'block' : 'none';

        upgrades.forEach((u, i) => {
            const btn = document.getElementById(`btn-${i}`);
            if (btn) {
                const cost = Math.floor(u.cost * Math.pow(1.2, state.inventory[i]));
                btn.disabled = state.sp < cost;
            }
        });
    }

    function dedicate() {
        state.faith += 0.5;
        state.sp = 0;
        state.inventory.fill(0);
        state.templeIdx = (state.templeIdx + 1) % temples.length;
        calculateSps();
        render();
        updateUI();
        localStorage.setItem('templeMobileSave', JSON.stringify(state));
    }

    function spawnFloat(x, y, text) {
        const el = document.createElement('div');
        el.className = 'float';
        el.style.left = `${x - 20}px`;
        el.style.top = `${y - 20}px`;
        el.innerText = text;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    function format(n) {
        if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n/1000).toFixed(1) + 'k';
        return Math.floor(n);
    }

    function loop() {
        state.sp += (state.sps * state.faith) / 10;
        updateUI();
    }

    init();
</script>
</body>
</html>
