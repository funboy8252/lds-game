<!DOCTYPE html>
<html lang="en">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LDS Games">
<link rel="apple-touch-icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>LDS Kids Games</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#0f172a;
    color:white;
    overflow:hidden;
}

.screen{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    overflow:hidden;
}

.active{
    display:flex;
}

button{
    border:none;
    cursor:pointer;
}

/* HOME */

#home{
    background:linear-gradient(180deg,#2563eb,#0f172a);
    overflow:auto;
}

.title{
    font-size:48px;
    font-weight:900;
    margin-top:40px;
}

.subtitle{
    opacity:.8;
    margin-top:10px;
    margin-bottom:30px;
}

.grid{
    width:95%;
    max-width:500px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    padding-bottom:40px;
}

.card{
    background:rgba(255,255,255,.12);
    border-radius:28px;
    padding:20px;
}

.icon{
    font-size:55px;
    margin-bottom:15px;
}

.card h2{
    margin-bottom:10px;
}

.card p{
    opacity:.75;
    line-height:1.3;
    margin-bottom:18px;
}

.play{
    width:100%;
    padding:14px;
    border:none;
    border-radius:18px;
    background:white;
    font-size:18px;
    font-weight:800;
}

/* TOP */

.top{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
    z-index:10;
}

.back{
    width:58px;
    height:58px;
    border-radius:18px;
    font-size:28px;
    font-weight:900;
}

.score{
    background:rgba(255,255,255,.15);
    padding:12px 18px;
    border-radius:18px;
    font-weight:800;
}

.big{
    font-size:36px;
    font-weight:900;
    margin-top:10px;
}

/* MEMORY */

#memory{
    background:linear-gradient(180deg,#7c3aed,#111827);
}

.memoryGrid{
    width:95%;
    max-width:450px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-top:30px;
}

.memoryCard{
    aspect-ratio:1/1;
    background:#312e81;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    font-weight:900;
    transition:.2s;
}

.memoryCard.show{
    background:white;
    color:black;
}

/* RUNNER */

#runner{
    background:linear-gradient(#38bdf8,#93c5fd 60%,#65a30d 60%);
}

.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:130px;
    background:#65a30d;
}

#player{
    position:absolute;
    left:60px;
    bottom:130px;
    font-size:70px;
}

.obstacle{
    position:absolute;
    bottom:130px;
    font-size:55px;
}

.scroll{
    position:absolute;
    bottom:240px;
    font-size:40px;
}

.jump{
    position:absolute;
    bottom:20px;
    right:20px;
    width:120px;
    height:120px;
    border-radius:999px;
    background:white;
    font-size:24px;
    font-weight:900;
}

/* RED SEA */

#sea{
    background:#38bdf8;
}

.instructions{
    margin-top:120px;
    font-size:28px;
    font-weight:900;
    text-align:center;
}

#moses{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:70px;
}

.wave{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:999px;
    background:#7dd3fc;
}

/* MAZE */

#maze{
    background:linear-gradient(180deg,#7c3aed,#111827);
}

.mazeBox{
    position:relative;
    width:340px;
    height:500px;
    background:#1e293b;
    border-radius:24px;
    margin-top:30px;
}

.path{
    position:absolute;
    background:#facc15;
}

#mazePlayer{
    position:absolute;
    width:40px;
    height:40px;
    border-radius:999px;
    background:white;
    left:20px;
    top:430px;
    z-index:5;
}

.goal{
    position:absolute;
    right:20px;
    top:20px;
    width:70px;
    height:70px;
    border-radius:20px;
    background:#22c55e;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:35px;
}

.popup{
    position:fixed;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    color:black;
    padding:18px 26px;
    border-radius:22px;
    font-weight:900;
    font-size:22px;
    z-index:9999;
    display:none;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

</style>
</head>
<body>

<div class="popup" id="popup"></div>

<!-- HOME -->

<div class="screen active" id="home">

    <div class="title">
        LDS Kids Games
    </div>

    <div class="subtitle">
        Fun games for kids
    </div>

    <div class="grid">

        <div class="card">
            <div class="icon">🧠</div>

            <h2>Memory Match</h2>

            <p>
                Match all the scripture cards.
            </p>

            <button class="play"
            onclick="openScreen('memory')">
            Play
            </button>
        </div>

        <div class="card">
            <div class="icon">🏃</div>

            <h2>Scripture Run</h2>

            <p>
                Jump over rocks and collect scrolls.
            </p>

            <button class="play"
            onclick="startRunner()">
            Play
            </button>
        </div>

        <div class="card">
            <div class="icon">🌊</div>

            <h2>Red Sea Escape</h2>

            <p>
                Swipe to dodge waves.
            </p>

            <button class="play"
            onclick="startSea()">
            Play
            </button>
        </div>

        

    </div>

</div>

<!-- MEMORY -->

<div class="screen" id="memory">

    <div class="top">

        <button class="back"
        onclick="goHome()">
        ←
        </button>

        <div class="score">
            Matches: <span id="matchText">0</span>
        </div>

    </div>

    <div class="big">
        Memory Match
    </div>

    <div class="memoryGrid" id="memoryGrid"></div>

</div>

<!-- RUNNER -->

<div class="screen" id="runner">

    <div class="top">

        <button class="back"
        onclick="goHome()">
        ←
        </button>

        <div class="score">
            Score: <span id="runnerScore">0</span>
        </div>

    </div>

    <div id="player">🏃‍♂️</div>

    <div class="ground"></div>

    <button class="jump"
    onclick="jump()">
    JUMP
    </button>

</div>

<!-- SEA -->

<div class="screen" id="sea">

    <div class="top">

        <button class="back"
        onclick="goHome()">
        ←
        </button>

    </div>

    <div class="instructions">
        Swipe to dodge waves
    </div>

    <div id="moses">🧔</div>

</div>



<script>

function showPopup(text){

    const popup=document.getElementById("popup");

    popup.innerText=text;

    popup.style.display="block";

    clearTimeout(window.popupTimeout);

    window.popupTimeout=setTimeout(()=>{

        popup.style.display="none";

    },1800);

}

function openScreen(id){

    document.querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));

    document.getElementById(id)
    .classList.add("active");
}

function goHome(){

    stopRunner();

    document.querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));

    document.getElementById("home")
    .classList.add("active");
}

/* MEMORY */

const symbols=[
"📖","🌊","⭐","⛪",
"📖","🌊","⭐","⛪",
"🔥","👑","🐑","🧔",
"🔥","👑","🐑","🧔"
];

let firstCard=null;
let secondCard=null;
let lock=false;
let matches=0;

function buildMemory(){

    const grid=document.getElementById("memoryGrid");

    grid.innerHTML="";

    matches=0;

    document.getElementById("matchText")
    .innerText=0;

    symbols
    .sort(()=>Math.random()-.5)
    .forEach(symbol=>{

        const card=document.createElement("div");

        card.className="memoryCard";

        card.dataset.symbol=symbol;

        card.onclick=()=>flipCard(card);

        grid.appendChild(card);

    });

}

function flipCard(card){

    if(lock)return;

    if(card.classList.contains("show"))return;

    card.classList.add("show");

    card.innerText=card.dataset.symbol;

    if(!firstCard){

        firstCard=card;

    }else{

        secondCard=card;

        if(firstCard.dataset.symbol===secondCard.dataset.symbol){

            matches++;
            document.getElementById("matchText").innerText=matches;

            if(matches===8){
                showPopup("⭐ Level complete!");
                setTimeout(()=>{
                    buildMemory();
                },1200);
            }

            firstCard=null;
            secondCard=null;

        }else{

            lock=true;

            setTimeout(()=>{

                firstCard.classList.remove("show");
                secondCard.classList.remove("show");

                firstCard.innerText="";
                secondCard.innerText="";

                firstCard=null;
                secondCard=null;

                lock=false;

            },700);

        }

    }

}

buildMemory();

/* SCRIPTURE RUN */

let runnerLoop;
let obstacleLoop;
let scrollLoop;

let jumping=false;
let score=0;

function startRunner(){

    stopRunner();

    openScreen("runner");

    score=0;

    document.getElementById("runnerScore")
    .innerText=0;

    const player=document.getElementById("player");

    player.innerText="🏃‍♂️";

    player.style.bottom="130px";

    runnerLoop=setInterval(()=>{

        score++;

        document.getElementById("runnerScore")
        .innerText=score;

    },1000);

    obstacleLoop=setInterval(createObstacle,2600);

    scrollLoop=setInterval(createScroll,3500);

}

function createObstacle(){

    const obstacle=document.createElement("div");

    obstacle.className="obstacle";

    obstacle.innerText=
    ["🪨","🌵"]
    [Math.floor(Math.random()*2)];

    obstacle.style.left=window.innerWidth+"px";

    document.getElementById("runner")
    .appendChild(obstacle);

    let x=window.innerWidth;

    const move=setInterval(()=>{

        x-=5;

        obstacle.style.left=x+"px";

        const playerBottom=
        parseInt(
        getComputedStyle(
        document.getElementById("player")
        ).bottom
        );

        if(x<110&&x>50&&playerBottom<170){

            clearInterval(move);

            showPopup("Game Over! Try Again!");

            goHome();

        }

        if(x<-100){

            obstacle.remove();

            clearInterval(move);

        }

    },16);

}

function createScroll(){

    const scroll=document.createElement("div");

    scroll.className="scroll";

    scroll.innerText="📜";

    scroll.style.left=window.innerWidth+"px";

    document.getElementById("runner")
    .appendChild(scroll);

    let x=window.innerWidth;

    const move=setInterval(()=>{

        x-=5;

        scroll.style.left=x+"px";

        if(x<120&&x>40&&jumping){

            score+=5;

            document.getElementById("runnerScore")
            .innerText=score;

            scroll.remove();

            clearInterval(move);

        }

        if(x<-100){

            scroll.remove();

            clearInterval(move);

        }

    },16);

}

function jump(){

    if(jumping)return;

    jumping=true;

    const player=document.getElementById("player");

    let y=130;

    const up=setInterval(()=>{

        y+=10;

        player.style.bottom=y+"px";

        if(y>=320){

            clearInterval(up);

            const down=setInterval(()=>{

                y-=8;

                player.style.bottom=y+"px";

                if(y<=130){

                    clearInterval(down);

                    jumping=false;

                }

            },16);

        }

    },16);

}

function stopRunner(){

    clearInterval(runnerLoop);
    clearInterval(obstacleLoop);
    clearInterval(scrollLoop);
}

/* RED SEA */

let seaLoop;

function startSea(){

    openScreen("sea");

    clearInterval(seaLoop);

    seaLoop=setInterval(createWave,1200);

}

function createWave(){

    const wave=document.createElement("div");

    wave.className="wave";

    wave.style.left=
    Math.random()*window.innerWidth+"px";

    wave.style.top="-80px";

    document.getElementById("sea")
    .appendChild(wave);

    let y=-80;

    const move=setInterval(()=>{

        y+=7;

        wave.style.top=y+"px";

        const moses=
        document.getElementById("moses");

        const mosesX=
        moses.getBoundingClientRect().left;

        const waveX=
        wave.getBoundingClientRect().left;

        if(
        y>window.innerHeight-220 &&
        Math.abs(waveX-mosesX)<60
        ){

            showPopup("🌊 The wave got you!");

            goHome();

        }

        if(y>window.innerHeight){

            wave.remove();

            clearInterval(move);

        }

    },16);

}

document.addEventListener("touchmove",e=>{

    if(
    !document.getElementById("sea")
    .classList.contains("active")
    )return;

    document.getElementById("moses")
    .style.left=
    e.touches[0].clientX+"px";

});

/* MAZE */

</script>

</body>
</html>
