<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temple Clicker: Global</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --sub: #65676b;
            --primary: #007AFF; --accent: #d4af37; --border: #ddd;
        }
        [data-theme="dark"] {
            --bg: #18191a; --card: #242526; --text: #e4e6eb; --sub: #b0b3b8;
            --primary: #2d88ff; --accent: #f1c40f; --border: #3e4042;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; background: var(--bg); 
            margin: 0; color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .container { display: flex; flex: 1; flex-direction: column; height: 100%; }
        @media (min-width: 900px) {
            .container { flex-direction: row; }
            .menu-side { width: 420px; height: 100vh !important; border-radius: 0 !important; border-right: 1px solid var(--border); }
            .game-side { flex: 1; }
        }

        .header { background: var(--card); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .score { font-size: 1.8rem; font-weight: 800; }
        .mode-toggle { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }

        .game-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* THE PHOTO CLICKER STYLE */
        #click-container {
            width: clamp(200px, 40vw, 300px);
            height: clamp(200px, 40vw, 300px);
            position: relative;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s;
            border-radius: 20px; /* Rounded corners for the photo */
            overflow: hidden; /* This crops the image */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 4px solid var(--card);
        }
        #click-container:active { transform: scale(0.92); }
        
        #temple-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* AUTO-CROP: Makes every photo a perfect square */
            display: block;
        }

        #boost-alert { 
            position: absolute; top: 20px; background: var(--accent); color: #000; 
            padding: 10px 20px; border-radius: 20px; font-weight: bold; 
            display: none; z-index: 10; animation: bounce 1s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .menu-side { background: var(--card); height: 50vh; display: flex; flex-direction: column; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .scroll-list { flex: 1; overflow-y: auto; padding: 15px; }
        .section-tag { font-size: 0.75rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-top: 15px; display: block; }

        .card { 
            display: flex; align-items: center; background: var(--bg); padding: 12px; 
            margin-bottom: 8px; border-radius: 15px; border: 1px solid var(--border);
        }
        .info { flex: 1; margin-left: 12px; }
        .info b { display: block; font-size: 0.95rem; }
        .info span { font-size: 0.75rem; color: var(--sub); }
        .buy-btn { 
            background: var(--primary); color: #fff; border: none; padding: 8px 14px; 
            border-radius: 18px; font-weight: bold; cursor: pointer; min-width: 80px; 
        }
        .buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .prog-wrap { width: 80%; max-width: 400px; margin-top: 25px; }
        .bar { background: var(--border); height: 12px; border-radius: 6px; overflow: hidden; }
        #fill { background: var(--accent); width: 0%; height: 100%; transition: width 0.3s; }
        
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 30px;
            font-size: 0.8rem; display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="toast">Progress Saved!</div>

<div class="header">
    <div>
        <div class="score" id="points">0</div>
        <div style="font-size: 0.8rem; color: var(--sub)">SP/sec: <span id="sps">0</span> | Bonus: <span id="bonus-mult">1</span>x</div>
    </div>
    <button class="mode-toggle" onclick="toggleTheme()">🌓 Theme</button>
</div>

<div class="container">
    <div class="menu-side">
        <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
            <span>Ward Organization</span>
            <button onclick="hardReset()" style="font-size: 0.6rem; border: none; background: none; color: var(--sub); cursor: pointer;">Reset Data</button>
        </div>
        <div class="scroll-list" id="calling-list"></div>
    </div>

    <div class="game-side">
        <div id="boost-alert">🔥 DIVINE BOOST: 3x!</div>
        <div style="font-weight: bold; color: var(--accent); margin-bottom: 15px; font-size: 1.2rem;" id="t-name">Loading...</div>
        
        <div id="click-container">
            <img src="" id="temple-img" alt="Temple Photo">
        </div>

        <div class="prog-wrap">
            <div class="bar"><div id="fill"></div></div>
            <p style="text-align: center; font-size: 0.75rem; margin-top: 8px; font-weight: bold;" id="t-prog">0% Complete</p>
        </div>
        <button id="ded-btn" style="display:none; margin-top: 20px; padding: 14px 30px; border-radius: 25px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; color: black;" onclick="dedicate()">✨ DEDICATE TEMPLE</button>
    </div>
</div>

<script>
    let state = { sp: 0, tIdx: 0, faith: 1.0, counts: {}, boost: 1, theme: 'light', totalEarned: 0 };

    // Pointing to your folder: temples/filename.png
    const temples = [
        { name: "Kirtland Ohio", goal: 300, file: "kirtland.png" },
        { name: "Logan Utah", goal: 1000, file: "logan.png" },
        { name: "Lehi Utah", goal: 5000, file: "lehi.png" },
        { name: "Phoenix Arizona", goal: 15000, file: "phoenix.png" },
        { name: "Nauvoo Illinois", goal: 50000, file: "nauvoo.png" },
        { name: "Salt Lake City", goal: 250000, file: "salt.png" },
        { name: "Bern Switzerland", goal: 1000000, file: "bern.png" },
        { name: "Manila Philippines", goal: 10000000, file: "manila.png" }
    ];

    const callings = [
        { cat: "Service", list: [
            { id: 0, name: "Cleaning Guard", cost: 15, sps: 0.5, icon: "🧹" },
            { id: 1, name: "Youth Volunteer", cost: 150, sps: 3, icon: "🙌" },
            { id: 2, name: "Activity Committee", cost: 1200, sps: 18, icon: "🎉" },
            { id: 3, name: "Family Search Aide", cost: 8000, sps: 85, icon: "🌳" },
            { id: 4, name: "Indexing Hero", cost: 40000, sps: 350, icon: "💻" }
        ]},
        { cat: "Ward Leadership", list: [
            { id: 5, name: "Primary Teacher", cost: 150000, sps: 1200, icon: "🖍️" },
            { id: 6, name: "Ward Organist", cost: 800000, sps: 5500, icon: "🎹" },
            { id: 7, name: "EQ Counselor", cost: 4000000, sps: 22000, icon: "📋" },
            { id: 8, name: "RS President", cost: 20000000, sps: 95000, icon: "🍲" },
            { id: 9, name: "Bishopric Member", cost: 100000000, sps: 400000, icon: "🗝️" }
        ]},
        { cat: "Global Work", list: [
            { id: 10, name: "Full-Time Elder", cost: 600000000, sps: 2000000, icon: "👔" },
            { id: 11, name: "Sister Missionary", cost: 600000000, sps: 2100000, icon: "👗" },
            { id: 12, name: "Mission President", cost: 3000000000, sps: 12000000, icon: "🌏" },
            { id: 13, name: "Area Architect", cost: 15000000000, sps: 55000000, icon: "📐" },
            { id: 14, name: "Temple President", cost: 100000000000, sps: 300000000, icon: "🏛️" },
            { id: 15, name: "General Authority", cost: 500000000000, sps: 1500000000, icon: "🕴️" },
            { id: 16, name: "Prophet", cost: 2000000000000, sps: 8000000000, icon: "📜" }
        ]}
    ];

    function init() {
        const saved = localStorage.getItem('TC_Pro_Save');
        if (saved) {
            const parsed = JSON.parse(saved);
            Object.keys(state).forEach(key => {
                if (parsed[key] !== undefined && !isNaN(parsed[key]) && typeof parsed[key] !== 'object') {
                    state[key] = parsed[key];
                }
            });
            if (parsed.counts) state.counts = parsed.counts;
        }
        
        document.documentElement.setAttribute('data-theme', state.theme || 'light');
        renderCallings();
        updateUI();
        setInterval(loop, 100);
        setInterval(checkBoost, 30000);
    }

    function toggleTheme() {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', state.theme);
        save();
    }

    function renderCallings() {
        const container = document.getElementById('calling-list');
        container.innerHTML = '';
        callings.forEach(group => {
            container.innerHTML += `<span class="section-tag">${group.cat}</span>`;
            group.list.forEach(c => {
                const count = state.counts[c.id] || 0;
                const cost = Math.floor(c.cost * Math.pow(1.18, count));
                container.innerHTML += `
                    <div class="card">
                        <div style="font-size: 1.5rem;">${c.icon}</div>
                        <div class="info"><b>${c.name} (${count})</b><span>+${format(c.sps)} SP/s</span></div>
                        <button class="buy-btn" id="btn-${c.id}" onclick="buy(${c.id}, ${c.cost})">${format(cost)}</button>
                    </div>`;
            });
        });
    }

    function buy(id, base) {
        const count = state.counts[id] || 0;
        const cost = Math.floor(base * Math.pow(1.18, count));
        if (state.sp >= cost) {
            state.sp -= cost;
            state.counts[id] = count + 1;
            renderCallings();
            updateUI();
            save();
        }
    }

    function checkBoost() {
        if (Math.random() > 0.8 && state.boost === 1) {
            state.boost = 3;
            document.getElementById('boost-alert').style.display = 'block';
            setTimeout(() => {
                state.boost = 1;
                document.getElementById('boost-alert').style.display = 'none';
            }, 15000);
        }
    }

    function getSPS() {
        let total = 0;
        callings.forEach(g => g.list.forEach(c => total += (c.sps * (state.counts[c.id] || 0))));
        return total * state.faith * state.boost;
    }

    function getClickBonus() {
        return 1 + (Math.floor(state.totalEarned / 1000000) * 0.05);
    }

    function handleClick() {
        const amount = (1 + (getSPS() * 0.15)) * state.faith * getClickBonus();
        if(!isNaN(amount)) {
            state.sp += amount;
            state.totalEarned += amount;
        }
        updateUI();
    }

    // Touch and Mouse support
    const clickArea = document.getElementById('click-container');
    clickArea.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(); });
    clickArea.addEventListener('mousedown', handleClick);

    function updateUI() {
        document.getElementById('points').innerText = Math.floor(state.sp).toLocaleString();
        document.getElementById('sps').innerText = format(getSPS());
        document.getElementById('bonus-mult').innerText = getClickBonus().toFixed(2);
        
        const t = temples[state.tIdx];
        document.getElementById('t-name').innerText = t.name;
        document.getElementById('temple-img').src = "temples/" + t.file;

        const prog = Math.min((state.sp / t.goal) * 100, 100);
        document.getElementById('fill').style.width = prog + "%";
        document.getElementById('t-prog').innerText = Math.floor(prog) + "% Complete";
        document.getElementById('ded-btn').style.display = (prog >= 100) ? 'block' : 'none';

        callings.forEach(g => g.list.forEach(c => {
            const btn = document.getElementById(`btn-${c.id}`);
            if(btn) {
                const cost = Math.floor(c.cost * Math.pow(1.18, (state.counts[c.id] || 0)));
                btn.disabled = state.sp < cost;
            }
        }));
    }

    function hardReset() {
        if(confirm("Wipe all data? This cannot be undone!")) {
            localStorage.removeItem('TC_Pro_Save');
            location.reload();
        }
    }

    function dedicate() {
        state.faith += 0.5; state.sp = 0; state.counts = {};
        state.tIdx = (state.tIdx + 1) % temples.length;
        renderCallings(); updateUI(); save();
    }

    function format(n) {
        if (n >= 1e12) return (n/1e12).toFixed(1) + 'T';
        if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
        return Math.floor(n);
    }

    function loop() { 
        const income = (getSPS() / 10);
        state.sp += income; state.totalEarned += income;
        updateUI(); 
    }
    
    function save() { localStorage.setItem('TC_Pro_Save', JSON.stringify(state)); }

    init();
</script>
</body>
</html>
